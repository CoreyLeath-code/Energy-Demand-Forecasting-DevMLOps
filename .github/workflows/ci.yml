name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          pip install numpy pandas scikit-learn pyyaml joblib xgboost
          pip install fastapi uvicorn pydantic httpx

      - name: Lint with flake8
        run: |
          # stop the build if there are syntax errors or undefined names
          flake8 src/ tests/test_metrics.py tests/test_preprocess.py \
            --count --select=E9,F63,F7,F82 --show-source --statistics
          # warn on style issues (non-blocking)
          flake8 src/ tests/test_metrics.py tests/test_preprocess.py \
            --count --max-line-length=120 --statistics || true

      - name: Run tests
        run: |
          pytest tests/test_metrics.py tests/test_preprocess.py tests/test_api.py -v
