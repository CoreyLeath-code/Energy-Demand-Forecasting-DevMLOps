name: Energy Forecasting Security & Supply Chain

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: python
      - uses: github/codeql-action/analyze@v4

  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan current source tree
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.24.0 \
            detect --source . --no-git --redact --no-banner --exit-code 1

  trivy-filesystem:
    name: Trivy Filesystem Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-filesystem.json
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
      - uses: actions/upload-artifact@v4
        with:
          name: trivy-filesystem-report
          path: trivy-filesystem.json
          if-no-files-found: error

  trivy-container:
    name: Trivy Container Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build deployment image
        run: docker build -t energy-forecasting-security:${{ github.sha }} .
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: energy-forecasting-security:${{ github.sha }}
          format: json
          output: trivy-container.json
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
      - uses: actions/upload-artifact@v4
        with:
          name: trivy-container-report
          path: trivy-container.json
          if-no-files-found: error

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-api.txt
            streamlit_demo/requirements.txt
      - name: Install pip-audit
        run: pip install pip-audit==2.7.3
      - name: Generate API dependency report
        run: |
          set +e
          pip-audit -r requirements-api.txt --format json --output pip-audit-api.json
          echo "API dependency findings retained for triage."
          exit 0
      - name: Generate Streamlit dependency report
        run: |
          set +e
          pip-audit -r streamlit_demo/requirements.txt --format json --output pip-audit-streamlit.json
          echo "Streamlit dependency findings retained for triage."
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-reports
          path: |
            pip-audit-api.json
            pip-audit-streamlit.json
          if-no-files-found: warn

  sbom:
    name: CycloneDX SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: energy-forecasting-sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: energy-forecasting-sbom
          path: energy-forecasting-sbom.cdx.json
          if-no-files-found: error
