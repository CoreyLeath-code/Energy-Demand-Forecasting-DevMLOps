apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: energy-forecast-api
  labels:
    app.kubernetes.io/name: energy-forecast-api
    app.kubernetes.io/component: autoscaling
    app.kubernetes.io/part-of: energy-demand-forecasting-devmlops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: energy-forecast-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      selectPolicy: Max
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      selectPolicy: Min
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
