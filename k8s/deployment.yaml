apiVersion: apps/v1
kind: Deployment
metadata:
  name: energy-forecast-api
  labels:
    app.kubernetes.io/name: energy-forecast-api
    app.kubernetes.io/component: inference
    app.kubernetes.io/part-of: energy-demand-forecasting-devmlops
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: energy-forecast-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: energy-forecast-api
        app.kubernetes.io/component: inference
        app.kubernetes.io/part-of: energy-demand-forecasting-devmlops
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/coreyleath-code/energy-demand-forecasting-devmlops:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: MODEL_PATH
              value: /app/models/energy_forecast_model.pkl
            - name: PYTHONUNBUFFERED
              value: "1"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 2
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
          volumeMounts:
            - name: temporary-files
              mountPath: /tmp
            - name: model-artifacts
              mountPath: /app/models
              readOnly: true
      volumes:
        - name: temporary-files
          emptyDir:
            sizeLimit: 64Mi
        - name: model-artifacts
          emptyDir:
            sizeLimit: 1Gi
