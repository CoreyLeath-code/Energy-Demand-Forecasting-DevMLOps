version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: trojan3877/energy-forecast:latest
    container_name: energy-forecast-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/models/energy_forecast_model.pkl
    volumes:
      - ./models:/app/models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; r = urllib.request.urlopen('http://localhost:8000/health'); sys.exit(0 if r.status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
