apiVersion: v1
kind: Service
metadata:
  name: {{ include "energy-demand-forecast.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "energy-demand-forecast.name" . }}
    app.kubernetes.io/component: inference
    app.kubernetes.io/part-of: energy-demand-forecasting-devmlops
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "energy-demand-forecast.name" . }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: http
