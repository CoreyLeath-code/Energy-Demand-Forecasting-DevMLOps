---
# ansible/group_vars/all.yaml
# Global variables for Energy Demand Forecasting - DevMLOps
# Author: Corey Leath

# --- Kubernetes ---
kubeconfig_path: "~/.kube/config"
k8s_namespace: "default"
k8s_manifests_dir: "{{ playbook_dir }}/../k8s"

# --- Docker Image ---
docker_image: "trojan3877/energy-forecast"
docker_tag: "latest"

# --- MLflow ---
mlflow_tracking_uri: "http://mlflow:5000"
mlflow_compose_dir: "{{ playbook_dir }}/../mlflow"

# --- Monitoring ---
monitoring_compose_dir: "{{ playbook_dir }}/../monitoring"

# --- Application ---
app_port: 8000
model_path: "/app/model"
