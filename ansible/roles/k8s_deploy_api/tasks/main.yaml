---
# ansible/roles/k8s_deploy_api/tasks/main.yaml
# Deploy Energy Forecasting API to Kubernetes
# Author: Corey Leath

- name: Apply Kubernetes secrets
  ansible.builtin.command:
    cmd: kubectl apply -f "{{ k8s_manifests_dir }}/secrets.yaml" --kubeconfig "{{ kubeconfig_path }}"
  changed_when: true

- name: Apply Kubernetes deployment
  ansible.builtin.command:
    cmd: kubectl apply -f "{{ k8s_manifests_dir }}/deployment.yaml" --kubeconfig "{{ kubeconfig_path }}"
  changed_when: true

- name: Apply Kubernetes service
  ansible.builtin.command:
    cmd: kubectl apply -f "{{ k8s_manifests_dir }}/service.yaml" --kubeconfig "{{ kubeconfig_path }}"
  changed_when: true

- name: Apply Kubernetes ingress
  ansible.builtin.command:
    cmd: kubectl apply -f "{{ k8s_manifests_dir }}/ingress.yaml" --kubeconfig "{{ kubeconfig_path }}"
  changed_when: true

- name: Apply Horizontal Pod Autoscaler
  ansible.builtin.command:
    cmd: kubectl apply -f "{{ k8s_manifests_dir }}/hpa.yaml" --kubeconfig "{{ kubeconfig_path }}"
  changed_when: true

- name: Wait for deployment rollout
  ansible.builtin.command:
    cmd: >
      kubectl rollout status deployment/energy-forecast-app
      --namespace "{{ k8s_namespace }}"
      --kubeconfig "{{ kubeconfig_path }}"
      --timeout=120s
  changed_when: false
